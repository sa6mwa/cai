name: cai-e2e

services:
  searxng:
    image: "${CAI_SEARXNG_IMAGE:-docker.io/searxng/searxng:2026.6.24-e3126b89e}"
    restart: unless-stopped
    ports:
      - "${CAI_SEARXNG_PORT:-8888}:8080"
    environment:
      SEARXNG_BASE_URL: "http://127.0.0.1:${CAI_SEARXNG_PORT:-8888}/"
      SEARXNG_SECRET: "${CAI_SEARXNG_SECRET:-cai-local-searxng-secret}"
    volumes:
      - ./compose/searxng/settings.yml:/etc/searxng/settings.yml:ro

  mcp-everything:
    build:
      context: .
      dockerfile: compose/mcp-everything/Dockerfile
      args:
        MCP_EVERYTHING_VERSION: "${CAI_MCP_EVERYTHING_VERSION:-2026.1.26}"
    image: "cai-mcp-everything:${CAI_MCP_EVERYTHING_VERSION:-2026.1.26}"
    restart: unless-stopped
    ports:
      - "${CAI_MCP_EVERYTHING_PORT:-3001}:3001"
    environment:
      PORT: "3001"
