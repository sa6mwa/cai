# cai local SearXNG test configuration.
#
# This intentionally keeps the instance small and local-development oriented.
# JSON output is enabled because cai's tool preset will consume /search with
# format=json.

use_default_settings: true

general:
  debug: false
  instance_name: "cai-local-searxng"

search:
  safe_search: 0
  autocomplete: ""
  formats:
    - html
    - json

server:
  bind_address: "0.0.0.0"
  port: 8080
  secret_key: "cai-local-searxng-secret"
  limiter: false
  image_proxy: false
